# ============================================================================
# Organizaciones terroristas designadas — listas oficiales
# ============================================================================
# Fuentes:
#   - US State Department Foreign Terrorist Organizations (FTO)
#   - EU terrorist list
#   - UN Security Council Consolidated Sanctions List
#
# Cada entrada tiene un nombre canónico y alias. Todos se matchean como
# frase completa (multi-word) con boundaries de palabra en los extremos.
# ============================================================================

categories:

  jihadist:
    severity: explicit
    description: Grupos yihadistas designados por múltiples gobiernos
    entries:
      - canonical: "Al-Qaeda"
        aliases:
          - "Al Qaeda"
          - "Al-Qaida"
          - "Al Qaida"
          - "AQAP"               # Al-Qaeda in the Arabian Peninsula
          - "AQIM"               # Al-Qaeda in the Islamic Maghreb
          - "Al-Qaeda in Iraq"
          - "Al-Nusra"
          - "Jabhat al-Nusra"
          - "Nusra Front"
          - "Hayat Tahrir al-Sham"
          - "HTS"

      - canonical: "Islamic State"
