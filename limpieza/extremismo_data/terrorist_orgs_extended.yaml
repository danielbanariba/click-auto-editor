# ============================================================================
# Organizaciones terroristas designadas — EXTENSIÓN
# ============================================================================
# Adiciones a terrorist_orgs.yaml derivadas de búsqueda contra listas oficiales
# actualizadas: US State Dept FTO/SDGT, EU Council 931, UN-1267, UK Home Office,
# Canada Public Safety, Australia, India MHA UAPA.
#
# Política de matching: SOLO frases multi-palabra y siglas inequívocas.
# Siglas demasiado ambiguas se omiten (ej. "AB" para Aryan Brotherhood
# colisiona con muchas cosas; mejor capturar el nombre completo).
# ============================================================================

