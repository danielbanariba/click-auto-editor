# ============================================================================
# Atrocidades históricas, dictadores y figuras del totalitarismo
# ============================================================================
# Contenido referenciado habitualmente por bandas de death/doom/grindcore en
# letras y nombres de tracks. Mucho de esto cae en contextos educativos o
# artísticos legítimos, pero YouTube puede flagear cualquier referencia que
# interprete como apología.
#
# FILTRO APLICADO (críticamente importante):
# - NO se incluyen términos peligrosamente ambiguos como apellidos sueltos
#   ("Mao", "Stalin" solo, "Reich" solo, "Wolf", "Heil", "Goth", etc.).
#   Solo frases multi-palabra o nombres completos.
# - "Wehrmacht" y "Luftwaffe" se omiten — fuerzas armadas alemanas
#   generales, no necesariamente criminales. Aparece en metal benigno.
# - "Hiroshima", "Nagasaki", "Dresden" solos: omitidos. Aparecen en
#   contextos antibélicos legítimos del crust/grindcore.
# - "88", "14" como números aislados: omitidos. Riesgo masivo de falsos
#   positivos en años, deportes, ranking, etc.
# - Nombres como "Manson", "Kim", "Franco", "Barbie" solos: omitidos.
# ============================================================================

