# ============================================================================
# Tiradores masivos y atacantes notorios — política específica de YouTube
# ============================================================================
# YouTube tiene política específica contra el elogio de tiradores escolares
# y atacantes masivos (mencionado textualmente en la formación, pregunta 7/7).
# Incluye también atacantes terroristas individuales famosos.
#
# CRÍTICO: incluso nombrarlos en contexto musical (death metal, etc.)
# puede disparar strike si el algoritmo interpreta apología.
# ============================================================================

categories:

  school_shootings:
    severity: explicit
    description: Tiroteos escolares mediáticos
