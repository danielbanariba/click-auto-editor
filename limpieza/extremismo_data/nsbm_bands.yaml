# ============================================================================
# Bandas NSBM (National Socialist Black Metal) y artistas designados
# ============================================================================
# Bandas con ideología neonazi explícita, miembros condenados por crímenes
# vinculados a ideología, o presencia recurrente en escenas designadas.
# El usuario podría inadvertidamente subir alguna de estas bandas en su
# canal y recibir strike automático.
#
# IMPORTANTE — selección conservadora:
# - Solo bandas con asociación NSBM ampliamente documentada
# - Para nombres con palabras comunes ("Absurd", "The Base"), se incluye
#   un calificador para reducir falsos positivos
# - Si una banda no está en blacklist no significa endorsement — el
#   usuario debe usar su criterio para escenas grises
# ============================================================================

